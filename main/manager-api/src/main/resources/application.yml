# Tomcat
server:
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 1000
      min-spare: 30
  port: 8002
  servlet:
    context-path: /xiaozhi
    session:
      cookie:
        http-only: true

spring:
  # 环境 dev|test|prod
  profiles:
    active: dev
  messages:
    encoding: UTF-8
    basename: i18n/messages
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true
  main:
    allow-bean-definition-overriding: true

knife4j:
  enable: true
  basic:
    enable: false
    username: admin
    password: admin
  setting:
    enableFooter: false

renren:
  redis:
    open: true
  xss:
    enabled: true
    exclude-urls:

# 成长服务画像库(宿主机 /var/sqllit/growth_service.db,容器内只读挂载)
growth:
  profile-db-path: ${GROWTH_PROFILE_DB_PATH:/var/sqllit/growth_service.db}
  # 钉钉群机器人(角色不足兜底通知)。webhook/secret 通过环境变量注入,不落库明文。
  # 安全模式:secret 非空=加签(自动追加 timestamp+sign);为空=自定义关键字「角色匹配」。
  dingtalk-webhook: ${DINGTALK_WEBHOOK:}
  dingtalk-secret: ${DINGTALK_SECRET:}

#mybatis
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: xiaozhi.modules.*.entity
  global-config:
    #数据库相关配置
    db-config:
      #主键类型
      id-type: ASSIGN_ID
    banner: false
  #原生配置
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
  configuration-properties:
    prefix:
    blobType: BLOB
    boolValue: TRUE