# Replace cc.example.com and upstream with your own values.
# Requires this map in nginx http {} or conf.d:
#
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cc.example.com;

    ssl_certificate     /etc/nginx/ssl/example.com.crt;
    ssl_certificate_key /etc/nginx/ssl/example.com.key;

    # Strongly recommended. Generate with:
    #   printf 'claude:$(openssl passwd -apr1 YOUR_PASSWORD)\n' > /etc/nginx/.htpasswd-cc
    auth_basic "Claude Code Web";
    auth_basic_user_file /etc/nginx/.htpasswd-cc;

    client_max_body_size 50M;

    location / {
        # Tailscale Funnel example. This should point to local ttyd.
        proxy_pass https://your-machine.your-tailnet.ts.net:18790;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_ssl_server_name on;
        proxy_ssl_name your-machine.your-tailnet.ts.net;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 30s;
        proxy_buffering off;
        proxy_cache off;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name cc.example.com;
    return 301 https://$host$request_uri;
}
